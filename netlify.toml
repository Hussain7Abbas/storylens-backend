[build]
  command = "bun run build:netlify"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["sharp", "@prisma/client", ".prisma/client"]
  included_files = ["node_modules/.prisma/**", "node_modules/@prisma/client/**"]

[dev]
  command = "bun run dev"
  targetPort = 3000
  autoLaunch = false

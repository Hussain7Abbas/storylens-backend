# Story Lens API — reverse proxy for Bun/Elysia backend
#
# Install:
#   sudo cp deploy/nginx/storylens-api.iscoded.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/storylens-api.iscoded.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (first run):
#   sudo certbot --nginx -d storylens-api.iscoded.com

upstream storylens_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name storylens-api.iscoded.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name storylens-api.iscoded.com;

    ssl_certificate /etc/letsencrypt/live/storylens-api.iscoded.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storylens-api.iscoded.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 50m;

    access_log /var/log/nginx/storylens-api.access.log;
    error_log /var/log/nginx/storylens-api.error.log;

    location / {
        proxy_pass http://storylens_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# Story Lens API — reverse proxy for Bun/Elysia backend
#
# Install:
#   sudo cp deploy/nginx/storylens-api.iscoded.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/storylens-api.iscoded.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (first run):
#   sudo certbot --nginx -d storylens-api.iscoded.com

# Story Lens listens on 127.0.0.1:3030 (KIOS Chat uses :3000 on the same host).
upstream storylens_api {
    server 127.0.0.1:3030;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name storylens-api.iscoded.com;

    access_log /var/log/nginx/storylens-api.access.log;
    error_log /var/log/nginx/storylens-api.error.log;

    client_max_body_size 50m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://storylens_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# HTTPS block is added by certbot (`certbot --nginx -d storylens-api.iscoded.com`).
# After issuance, certbot will redirect HTTP → HTTPS and terminate TLS here.
